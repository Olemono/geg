<script>const imgContainer=document.getElementById('imgContainer'),gifOverlay=document.getElementById('gifOverlay'),openSubpage=document.getElementById('openSubpage'),closeSubpage=document.getElementById('closeSubpage'),subpageContainer=document.getElementById('subpageContainer'),yariClickArea=document.getElementById('yariClickArea'),yariMainImg=document.getElementById('yariMainImg'),yariGifOverlay=document.getElementById('yariGifOverlay'),topBlood=document.getElementById('topBlood'),spotsBlood=document.getElementById('spotsBlood');let expTimeout,yariClicked=!1;imgContainer.addEventListener('click',()=>{clearTimeout(expTimeout);gifOverlay.style.backgroundImage='none';void gifOverlay.offsetWidth;gifOverlay.style.backgroundImage=`url('boom.gif?t=${Date.now()}')`;expTimeout=setTimeout(()=>gifOverlay.style.backgroundImage='none',1000)});openSubpage.addEventListener('click',()=>{let frames=[0,-15,5,-10,0],currentFrame=0;function animateClick(){if(currentFrame<frames.length){openSubpage.style.transform=`translateY(${frames[currentFrame]}px) scale(0.95)`;currentFrame++;setTimeout(animateClick,40)}else{openSubpage.style.transform='none';subpageContainer.style.display='block';window.history.pushState({page:'itsme'},'Its Me','/geg/itsme')}}animateClick()});closeSubpage.addEventListener('click',()=>{subpageContainer.style.display='none';window.location.href='https://github.io'});yariClickArea.addEventListener('click',()=>{if(yariClicked)return;yariClicked=!0;yariGifOverlay.style.backgroundImage=`url('boom.gif?t=${Date.now()}')`;setTimeout(()=>{yariGifOverlay.style.backgroundImage='none';yariMainImg.src='https://file.garden'},1000)});window.addEventListener('popstate',(e)=>{subpageContainer.style.display=(e.state&&e.state.page==='itsme')?'block':'none'});</script>
