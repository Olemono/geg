<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Olemono Space</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://gstatic.com" crossorigin>
    <link href="https://googleapis.com" rel="stylesheet">
    
    <style>
        body {
            font-family: 'Montserrat', sans-serif;
            background-color: #fcdc88; 
            margin: 0;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .content-wrapper {
            max-width: 600px;
            width: 100%;
            text-align: center;
        }
        h1 {
            font-weight: 800;
            font-size: 3rem;
            background: linear-gradient(45deg, #300b03, #541103);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 30px;
        }
        .my-text {
            font-weight: 600; 
            font-size: 1.4rem;
            line-height: 1.6;
            color: #300b03; 
            margin-bottom: 40px;
            text-align: left; 
            border-left: 5px solid #300b03; 
            padding-left: 15px;
        }
        .gif-container {
            width: 100%;
            margin-bottom: 40px;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(48, 11, 3, 0.15);
        }
        .gif-container img {
            width: 100%;
            display: block;
        }
    </style>
</head>
<body>

    <div class="content-wrapper">
        <h1>Olemono Project</h1>
        
        <div class="my-text">
           йо, ватсап мен
        </div>

        <div class="gif-container">
            <img src="cooltext508766864810440.gif" alt="geg">
        </div>

        <div class="my-text">
            сайт кстати ещё не готов, йоу ожидайте
        </div>

        <div class="gif-container">
            <img src="boom.gif" alt="йо">
        </div>

    </div>

</body>
</html>
