<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Йо, это вебсайт яри</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            background-color: #63120d;
            color: #faddad;
            font-family: sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
        }

        body::before, body::after {
            content: "";
            position: fixed;
            top: 0;
            bottom: 0;
            width: 5vw; 
            background-color: #480c09;
            z-index: 10;
        }
        body::before { left: 0; }
        body::after { right: 0; }

        .container {
            width: 100%;
            max-width: 1200px;
            padding: 40px 7vw;
            display: flex;
            flex-direction: column;
            align-items: center;
            z-index: 1;
        }

        .header-block {
            text-align: center;
            margin-bottom: 60px;
        }

        .main-title {
            color: #feca86;
            font-size: 3rem;
            font-weight: bold;
            text-transform: uppercase;
            transform: scaleY(0.7); 
            display: inline-block;
            animation: floatAnim 4s ease-in-out infinite; 
        }

        @keyframes floatAnim {
            0%, 100% { transform: scaleY(0.7) translateY(0px); }
            50% { transform: scaleY(0.7) translateY(-8px); }
        }

        .sub-title {
            font-size: 1rem;
            margin-top: 5px;
            display: block;
        }

        .content-grid {
            width: 100%;
            display: flex;
            flex-wrap: wrap;
            gap: 40px;
            align-items: flex-start;
            margin-top: 20px;
        }

        .image-wrapper {
            flex: 1 1 25%;
            min-width: 250px;
            position: relative;
            cursor: pointer;
            user-select: none;
        }

        .clickable-img {
            width: 100%;
            height: auto;
            display: block;
            border-radius: 4px;
        }

        .gif-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
            pointer-events: none; 
        }

        .text-wrapper {
            flex: 1 1 60%;
            min-width: 280px;
            padding-top: 40px; 
        }

        .crooked-text {
            font-size: 1.3rem;
            line-height: 1.6;
            transform: rotate(-2deg); 
            display: inline-block;
        }
    </style>
</head>
<body>

    <div class="container">

        <div class="header-block">
            <h1 class="main-title">йо, это вебсайт яри</h1>
            <span class="sub-title">Гэг</span>
        </div>

       
        <div class="content-grid">
            
            <div class="image-wrapper" id="imgContainer">
                <img src="https://file.garden/alTn_6MGUV82xkxX/gegcomputer.png?v=1783972439610" alt="Geg Computer" class="clickable-img">
                <div class="gif-overlay" id="gifOverlay"></div>
            </div>

            <div class="text-wrapper">
                <p class="crooked-text">
                    йо тут будет потом важный текст йо тут будет потом важный текст йо тут будет потом важный текст йо тут будет потом важный текст йо тут будет потом важный текст йо тут будет потом важный текст
                </p>
            </div>
        </div>
    </div>

    <script>
        const imgContainer = document.getElementById('imgContainer');
        const gifOverlay = document.getElementById('gifOverlay');

        imgContainer.addEventListener('click', () => {
            
            gifOverlay.style.backgroundImage = 'none';
            
            void gifOverlay.offsetWidth;
            
            gifOverlay.style.backgroundImage = `url('boom.gif?t=${Date.now()}')`;
        });
    </style>

</body>
</html>
